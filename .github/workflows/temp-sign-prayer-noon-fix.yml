name: Temp Sign Prayer Noon Fix

on:
  pull_request:
    branches: [main]

concurrency:
  group: temp-sign-prayer-noon-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Build fixed shortcut and sign with HubSign
        run: |
          python3 - <<'PY'
          import base64, hashlib, json, plistlib, urllib.request, urllib.error, traceback
          from pathlib import Path

          log = []
          try:
              source_url = 'https://raw.githubusercontent.com/Nasser934/test-project/shortcut-signing-prayer-20260709/shortcut-signing/Prayer_Alarms_No_Duplicates.b64'
              with urllib.request.urlopen(source_url, timeout=60) as r:
                  raw_b64 = r.read().decode().strip()
              raw = base64.b64decode(raw_b64, validate=True)
              source_sha = hashlib.sha256(raw).hexdigest()
              log += [f'source_bytes={len(raw)}', f'source_sha256={source_sha}']
              expected_source_sha = '6b43e942e5d5069f583295293d00e06756ff2441f0f1885349375d156731f17e'
              if len(raw) != 7061 or source_sha != expected_source_sha:
                  raise ValueError('Unexpected source shortcut payload')

              shortcut = plistlib.loads(raw)
              actions = shortcut['WFWorkflowActions']
              dhuhr_get_idx = next(
                  i for i, a in enumerate(actions)
                  if a.get('WFWorkflowActionIdentifier') == 'is.workflow.actions.getvalueforkey'
                  and a.get('WFWorkflowActionParameters', {}).get('WFDictionaryKey') == 'data.timings.Dhuhr'
              )
              adjust_idx = dhuhr_get_idx + 1
              create_idx = dhuhr_get_idx + 2
              adjust_uuid = actions[adjust_idx]['WFWorkflowActionParameters']['UUID']
              format_uuid = 'F6D93E94-5B35-4EEA-9A0D-D53B625A7D2A'

              actions.insert(create_idx, {
                  'WFWorkflowActionIdentifier': 'is.workflow.actions.format.date',
                  'WFWorkflowActionParameters': {
                      'UUID': format_uuid,
                      'WFDate': {
                          'Value': {
                              'string': '\ufffc',
                              'attachmentsByRange': {
                                  '{0, 1}': {
                                      'OutputUUID': adjust_uuid,
                                      'Type': 'ActionOutput',
                                      'OutputName': 'Adjusted Date'
                                  }
                              }
                          },
                          'WFSerializationType': 'WFTextTokenString'
                      },
                      'WFDateFormatStyle': 'Custom',
                      'WFDateFormat': 'Custom',
                      'WFDateFormatString': 'hh:mm a'
                  }
              })

              create_action = actions[create_idx + 1]
              create_action['WFWorkflowActionParameters']['dateComponents'] = {
                  'Value': {
                      'string': '\ufffc',
                      'attachmentsByRange': {
                          '{0, 1}': {
                              'OutputUUID': format_uuid,
                              'Type': 'ActionOutput',
                              'OutputName': 'Formatted Date'
                          }
                      }
                  },
                  'WFSerializationType': 'WFTextTokenString'
              }

              fixed_raw = plistlib.dumps(shortcut, fmt=plistlib.FMT_BINARY, sort_keys=False)
              fixed_sha = hashlib.sha256(fixed_raw).hexdigest()
              log += [f'actions={len(actions)}', f'fixed_bytes={len(fixed_raw)}', f'fixed_sha256={fixed_sha}']
              if len(actions) != 37:
                  raise ValueError('Expected 37 actions after noon fix')

              xml = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False).decode('utf-8')
              payload = json.dumps({
                  'shortcutName': 'منبه الصلوات بدون تكرار - تصحيح الظهر',
                  'shortcut': xml,
              }, ensure_ascii=False).encode('utf-8')

              req = urllib.request.Request(
                  'https://hubsign.routinehub.services/sign',
                  data=payload,
                  headers={
                      'Content-Type': 'application/json',
                      'User-Agent': 'cherri/2.3.0',
                      'Accept': '*/*',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=60) as res:
                  body = res.read()
                  log += [f'status={res.status}', f'content_type={res.headers.get("Content-Type")}', f'response_bytes={len(body)}', f'prefix={body[:16]!r}']

              if not body.startswith(b'AEA1'):
                  Path('hubsign-response.bin').write_bytes(body)
                  raise ValueError('HubSign did not return an AEA1 signed shortcut')

              Path('Prayer_Alarms_No_Duplicates_Noon_Fixed_Signed.shortcut').write_bytes(body)
              log.append('signed=true')
          except urllib.error.HTTPError as e:
              body = e.read()
              Path('hubsign-response.bin').write_bytes(body)
              log += [f'http_error={e.code}', f'url={e.geturl()}', f'body_prefix={body[:1000]!r}']
              raise
          except Exception as e:
              log += [f'exception={type(e).__name__}: {e}', traceback.format_exc()]
              raise
          finally:
              Path('sign-diagnostics.txt').write_text('\n'.join(log), encoding='utf-8')
              print('\n'.join(log))
          PY

      - name: Upload fixed signed shortcut
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarms_No_Duplicates_Noon_Fixed_Signed
          path: |
            Prayer_Alarms_No_Duplicates_Noon_Fixed_Signed.shortcut
            sign-diagnostics.txt
            hubsign-response.bin
          if-no-files-found: warn
