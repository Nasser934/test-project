name: Sukun iOS CI

on:
  push:
    branches: [project-sukun-ios]
    paths: ['sukun/**', '.github/workflows/sukun-ios-ci.yml']
  pull_request:
    paths: ['sukun/**', '.github/workflows/sukun-ios-ci.yml']

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Core tests
        run: swift test --package-path sukun/Packages/SukunCore
      - name: Generate project
        working-directory: sukun
        run: xcodegen generate
      - name: Build simulator
        working-directory: sukun
        run: xcodebuild -project Sukun.xcodeproj -scheme Sukun -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
