name: Temp Sign Prayer V4.9

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Validate and sign Prayer V4.9 with HubSign
        run: |
          python3 - <<'PY'
          import base64, copy, hashlib, json, lzma, plistlib, urllib.request, urllib.error, traceback, uuid
          from pathlib import Path

          log = []
          def U():
              return str(uuid.uuid4()).upper()

          try:
              source_url = 'https://raw.githubusercontent.com/Nasser934/test-project/temp-sign-prayer-v48-20260710/shortcut-signing-v47/Prayer_Alarm_V47.xz.b64'
              with urllib.request.urlopen(source_url, timeout=60) as res:
                  encoded = res.read().decode('utf-8').strip()
              compressed = base64.b64decode(encoded, validate=True)
              raw = lzma.decompress(compressed)
              shortcut = plistlib.loads(raw)
              old = shortcut.get('WFWorkflowActions', [])
              questions = shortcut.get('WFWorkflowImportQuestions', [])
              if len(old) != 68:
                  raise ValueError(f'Expected 68 V4.7 source actions, found {len(old)}')

              new_actions = copy.deepcopy(old[:21])

              find_all = copy.deepcopy(old[21])
              fp = find_all['WFWorkflowActionParameters']
              find_uuid = U()
              fp['UUID'] = find_uuid
              fp['WFContentItemLimitNumber'] = 1
              fp['WFContentItemLimitEnabled'] = False
              fp['ShowWhenRun'] = False
              filt = fp['WFContentItemFilter']['Value']['WFActionParameterFilterTemplates'][0]
              filt['Operator'] = 99
              filt['Values'] = {'String': '🕌 صلاة ', 'Unit': 4}
              new_actions.append(find_all)

              group = U()
              new_actions.append({
                  'WFWorkflowActionIdentifier': 'is.workflow.actions.conditional',
                  'WFWorkflowActionParameters': {
                      'WFControlFlowMode': 0,
                      'GroupingIdentifier': group,
                      'WFInput': {
                          'Type': 'Variable',
                          'Variable': {
                              'Value': {
                                  'OutputUUID': find_uuid,
                                  'Type': 'ActionOutput',
                                  'OutputName': 'Alarms',
                              },
                              'WFSerializationType': 'WFTextTokenAttachment',
                          },
                      },
                      'WFCondition': 100,
                  },
              })

              delete_action = copy.deepcopy(old[23])
              dp = delete_action['WFWorkflowActionParameters']
              dp['UUID'] = U()
              dp['entities'] = {
                  'Value': {
                      'OutputUUID': find_uuid,
                      'Type': 'ActionOutput',
                      'OutputName': 'Alarms',
                  },
                  'WFSerializationType': 'WFTextTokenAttachment',
              }
              dp['ShowWhenRun'] = False
              new_actions.append(delete_action)

              new_actions.append({
                  'WFWorkflowActionIdentifier': 'is.workflow.actions.conditional',
                  'WFWorkflowActionParameters': {
                      'WFControlFlowMode': 2,
                      'GroupingIdentifier': group,
                      'UUID': U(),
                  },
              })

              for idx in [24, 31, 38, 45, 52]:
                  action = copy.deepcopy(old[idx])
                  action['WFWorkflowActionParameters']['UUID'] = U()
                  action['WFWorkflowActionParameters']['ShowWhenRun'] = False
                  new_actions.append(action)

              for idx in [64, 65, 66, 67]:
                  new_actions.append(copy.deepcopy(old[idx]))

              shortcut['WFWorkflowActions'] = new_actions
              shortcut['WFWorkflowName'] = 'منبه الصلوات الذكي V4.9'
              shortcut['WFWorkflowActions'][0]['WFWorkflowActionParameters']['WFCommentActionText'] = '''🌙 منبه الصلوات الذكي

يضبط هذا الاختصار تنبيهات الصلوات الخمس تلقائيًا حسب موقعك الحالي.

• يحدد أوقات الصلاة من موقعك الحالي.
• يمكنك تقديم أو تأخير تنبيه كل صلاة بالدقائق.
• 0 = وقت الصلاة نفسه.
• -10 = قبل الصلاة بـ 10 دقائق.
• 10 = بعد الصلاة بـ 10 دقائق.
• عند كل تشغيل يحذف تنبيهات الصلاة السابقة دفعة واحدة، ثم ينشئ خمسة تنبيهات بالأوقات الجديدة.
• لا يفتح تطبيق الساعة ولا يطلب الانتقال إلى إعداد الصوت.
• لا يحذف تنبيهاتك الشخصية الأخرى.
• يعمل من خلال منبهات الساعة حتى مع وضع الصامت أو عدم الإزعاج، بشرط ألا يكون صوت المنبه مضبوطًا على «بلا».
• إذا تعذر الاتصال بالإنترنت أو تحديد الموقع يتوقف التشغيل دون إنشاء أوقات خاطئة.

شغّل الاختصار يدويًا أول مرة وامنحه الصلاحيات المطلوبة، ثم فعّل الأتمتة اليومية.

تم إنشاؤه من:
ناصر
ادعوا له ولوالديه وأهله

للتواصل أو التنبيه عن أي مشكلة:
nasser.m.aldawsari@gmail.com'''

              actions = shortcut['WFWorkflowActions']
              ids = [a.get('WFWorkflowActionIdentifier') for a in actions]
              delete_count = ids.count('com.apple.mobiletimer.DeleteAlarmIntent')
              create_count = ids.count('com.apple.mobiletimer-framework.MobileTimerIntents.MTCreateAlarmIntent')
              find_count = ids.count('com.apple.mobiletimer-framework.MobileTimerIntents.MTGetAlarmsIntent')
              forbidden = {
                  'is.workflow.actions.choosefrommenu',
                  'is.workflow.actions.alert',
                  'is.workflow.actions.url',
                  'is.workflow.actions.openurl',
                  'is.workflow.actions.openurls',
                  'is.workflow.actions.waittoreturn',
                  'com.apple.mobiletimer.UpdateAlarmIntent',
              }
              present_forbidden = sorted(set(ids) & forbidden)

              if len(actions) != 34:
                  raise ValueError(f'Expected 34 actions, found {len(actions)}')
              if delete_count != 1:
                  raise ValueError(f'Expected one bulk delete action, found {delete_count}')
              if create_count != 5:
                  raise ValueError(f'Expected five create actions, found {create_count}')
              if find_count != 1:
                  raise ValueError(f'Expected one Find Alarms action, found {find_count}')
              if present_forbidden:
                  raise ValueError(f'Interactive/unsupported actions remain: {present_forbidden}')

              labels = [
                  a.get('WFWorkflowActionParameters', {}).get('label')
                  for a in actions
                  if a.get('WFWorkflowActionIdentifier') == 'com.apple.mobiletimer-framework.MobileTimerIntents.MTCreateAlarmIntent'
              ]
              expected_labels = ['🕌 صلاة الفجر', '🕌 صلاة الظهر', '🕌 صلاة العصر', '🕌 صلاة المغرب', '🕌 صلاة العشاء']
              if labels != expected_labels:
                  raise ValueError(f'Unexpected alarm labels/order: {labels}')

              action_uuids = {
                  a.get('WFWorkflowActionParameters', {}).get('UUID')
                  for a in actions
                  if a.get('WFWorkflowActionParameters', {}).get('UUID')
              }
              refs = []
              def walk(x):
                  if isinstance(x, dict):
                      for k, v in x.items():
                          if k == 'OutputUUID' and isinstance(v, str):
                              refs.append(v)
                          walk(v)
                  elif isinstance(x, list):
                      for v in x:
                          walk(v)
              walk(actions)
              missing = sorted(set(refs) - action_uuids)
              if missing:
                  raise ValueError(f'Unresolved ActionOutput UUIDs: {missing}')

              serialized = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False)
              source_sha = hashlib.sha256(serialized).hexdigest()
              Path('Prayer_Alarm_Smart_V4_9_Source.shortcut').write_bytes(serialized)

              payload = json.dumps({
                  'shortcutName': 'منبه الصلوات الذكي V4.9',
                  'shortcut': serialized.decode('utf-8'),
              }, ensure_ascii=False).encode('utf-8')

              req = urllib.request.Request(
                  'https://hubsign.routinehub.services/sign',
                  data=payload,
                  headers={
                      'Content-Type': 'application/json',
                      'User-Agent': 'cherri/2.3.0',
                      'Accept': '*/*',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=90) as res:
                  body = res.read()
                  log += [
                      f'status={res.status}',
                      f'source_sha256={source_sha}',
                      f'actions={len(actions)}',
                      f'import_questions={len(questions)}',
                      f'find_alarm_actions={find_count}',
                      f'delete_actions={delete_count}',
                      f'create_actions={create_count}',
                      f'forbidden_actions={present_forbidden}',
                      f'labels={labels}',
                      f'response_bytes={len(body)}',
                      f'prefix={body[:4]!r}',
                  ]

              Path('hubsign-response.bin').write_bytes(body)
              if not body.startswith(b'AEA1'):
                  raise ValueError('HubSign did not return an AEA1 signed shortcut')

              Path('Prayer_Alarm_Smart_V4_9_Signed.shortcut').write_bytes(body)
              log += ['signed=true', f'signed_sha256={hashlib.sha256(body).hexdigest()}']

          except urllib.error.HTTPError as e:
              body = e.read()
              Path('hubsign-response.bin').write_bytes(body)
              log += [f'http_error={e.code}', f'body_prefix={body[:1000]!r}']
              raise
          except Exception as e:
              log += [f'exception={type(e).__name__}: {e}', traceback.format_exc()]
              raise
          finally:
              Path('sign-diagnostics.txt').write_text('\n'.join(log), encoding='utf-8')
              print('\n'.join(log))
          PY

      - name: Upload signed V4.9 and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarm_Smart_V4_9_Signed
          path: |
            Prayer_Alarm_Smart_V4_9_Signed.shortcut
            Prayer_Alarm_Smart_V4_9_Source.shortcut
            sign-diagnostics.txt
            hubsign-response.bin
          if-no-files-found: warn
