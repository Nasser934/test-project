name: Temp Diagnose Prayer V4

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout V4 payload only
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing-v4
          sparse-checkout-cone-mode: true

      - name: Print V4 action structure
        run: |
          python3 - <<'PY'
          import base64, lzma, plistlib, json
          from pathlib import Path
          parts = [p.read_text().strip() for p in sorted(Path('shortcut-signing-v4/lzma').glob('part-*.txt'))]
          raw = lzma.decompress(base64.b64decode(''.join(parts), validate=True))
          s = plistlib.loads(raw)
          print('ACTIONS', len(s.get('WFWorkflowActions', [])))
          print('QUESTIONS', json.dumps(s.get('WFWorkflowImportQuestions', []), ensure_ascii=False, default=str))
          for i,a in enumerate(s.get('WFWorkflowActions', [])):
              ident=a.get('WFWorkflowActionIdentifier')
              p=a.get('WFWorkflowActionParameters',{})
              out={k:p.get(k) for k in ['WFControlFlowMode','GroupingIdentifier','WFCondition','WFConditionalActionString','WFNumberValue','WFDictionaryKey','WFVariableName','WFInputType','WFAskActionPrompt','WFAskActionDefaultAnswer','WFAdjustOperation','WFURLActionURL','WFNotificationActionTitle'] if k in p}
              print(f'{i:02d} {ident} {json.dumps(out, ensure_ascii=False, default=str)}')
          PY
