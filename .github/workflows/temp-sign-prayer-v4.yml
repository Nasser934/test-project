name: Temp Diagnose Prayer V4

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing-v4
          sparse-checkout-cone-mode: true
      - name: Export V4 structure
        run: |
          python3 - <<'PY'
          import base64,lzma,plistlib,json
          from pathlib import Path
          raw=lzma.decompress(base64.b64decode(''.join(p.read_text().strip() for p in sorted(Path('shortcut-signing-v4/lzma').glob('part-*.txt'))), validate=True))
          s=plistlib.loads(raw)
          out={'questions':s.get('WFWorkflowImportQuestions',[]),'actions':[]}
          for i,a in enumerate(s.get('WFWorkflowActions', [])):
            out['actions'].append({'index':i,'identifier':a.get('WFWorkflowActionIdentifier'),'parameters':a.get('WFWorkflowActionParameters',{})})
          Path('v4-structure.json').write_text(json.dumps(out,ensure_ascii=False,indent=2,default=str),encoding='utf-8')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: v4-structure
          path: v4-structure.json
          if-no-files-found: error
