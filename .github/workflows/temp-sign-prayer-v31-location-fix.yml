name: Temp Sign Prayer V3.1 Location Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Patch invalid location action and sign with HubSign
        run: |
          python3 - <<'PY'
          import base64, hashlib, json, plistlib, urllib.request, urllib.error, traceback
          from pathlib import Path

          log = []
          try:
              base = 'https://raw.githubusercontent.com/Nasser934/test-project/temp-sign-prayer-v3-20260710/shortcut-signing-v3/chunks'
              parts = []
              for i in range(1, 7):
                  url = f'{base}/part-{i:02d}.txt'
                  with urllib.request.urlopen(url, timeout=60) as r:
                      parts.append(r.read().decode('utf-8').strip())

              raw = base64.b64decode(''.join(parts), validate=True)
              old_sha = hashlib.sha256(raw).hexdigest()
              log += [f'old_bytes={len(raw)}', f'old_sha256={old_sha}']
              if old_sha != '9047da8deb017d9c522feff893d967d28205a60488fd48dd2901b7990dbfb9a2':
                  raise ValueError(f'Unexpected original SHA-256: {old_sha}')

              shortcut = plistlib.loads(raw)
              actions = shortcut.get('WFWorkflowActions', [])
              changed = []
              for i, action in enumerate(actions):
                  if action.get('WFWorkflowActionIdentifier') == 'is.workflow.actions.geolocation.get':
                      action['WFWorkflowActionIdentifier'] = 'is.workflow.actions.getcurrentlocation'
                      changed.append(i)

              log += [f'actions={len(actions)}', f'changed_indices={changed}']
              if len(actions) != 76:
                  raise ValueError(f'Expected 76 actions, got {len(actions)}')
              if changed != [21]:
                  raise ValueError(f'Expected to patch only action 21, got {changed}')

              fixed_raw = plistlib.dumps(shortcut, fmt=plistlib.FMT_BINARY, sort_keys=False)
              fixed_sha = hashlib.sha256(fixed_raw).hexdigest()
              log += [f'fixed_bytes={len(fixed_raw)}', f'fixed_sha256={fixed_sha}']
              if fixed_sha != '543ba1b058d950da49af6faf6a11e55ac1d97a637acce2d03028a06f43a61482':
                  raise ValueError(f'Unexpected fixed SHA-256: {fixed_sha}')

              xml = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False).decode('utf-8')
              payload = json.dumps({
                  'shortcutName': 'منبه الصلوات V3.1 - إصلاح الموقع',
                  'shortcut': xml,
              }, ensure_ascii=False).encode('utf-8')
              log.append(f'payload_bytes={len(payload)}')

              req = urllib.request.Request(
                  'https://hubsign.routinehub.services/sign',
                  data=payload,
                  headers={
                      'Content-Type': 'application/json',
                      'User-Agent': 'cherri/2.3.0',
                      'Accept': '*/*',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=90) as res:
                  body = res.read()
                  log += [
                      f'status={res.status}',
                      f'content_type={res.headers.get("Content-Type")}',
                      f'response_bytes={len(body)}',
                      f'prefix={body[:16]!r}',
                  ]

              Path('hubsign-response.bin').write_bytes(body)
              if not body.startswith(b'AEA1'):
                  raise ValueError('HubSign did not return an AEA1 signed shortcut')

              Path('Prayer_Alarm_V3_1_Location_Fixed_Signed.shortcut').write_bytes(body)
              log += [
                  'signed=true',
                  f'signed_sha256={hashlib.sha256(body).hexdigest()}',
              ]
          except urllib.error.HTTPError as e:
              body = e.read()
              Path('hubsign-response.bin').write_bytes(body)
              log += [f'http_error={e.code}', f'body_prefix={body[:1000]!r}']
              raise
          except Exception as e:
              log += [f'exception={type(e).__name__}: {e}', traceback.format_exc()]
              raise
          finally:
              Path('sign-diagnostics.txt').write_text('\n'.join(log), encoding='utf-8')
              print('\n'.join(log))
          PY

      - name: Upload signed shortcut and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarm_V3_1_Location_Fixed_Signed
          path: |
            Prayer_Alarm_V3_1_Location_Fixed_Signed.shortcut
            sign-diagnostics.txt
            hubsign-response.bin
          if-no-files-found: warn
