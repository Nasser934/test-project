name: Temp Sign Prayer V4.3 Alarm Only

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout V4.3 payload only
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing-v43
          sparse-checkout-cone-mode: true

      - name: Validate and sign Prayer V4.3 with HubSign
        run: |
          python3 - <<'PY'
          import base64, hashlib, json, lzma, plistlib, urllib.request, urllib.error, traceback
          from pathlib import Path

          log = []
          try:
              parts = [p.read_text().strip() for p in sorted(Path('shortcut-signing-v43/lzma').glob('part-*.txt'))]
              if len(parts) != 2:
                  raise ValueError(f'Expected 2 compressed chunks, got {len(parts)}')

              compressed = base64.b64decode(''.join(parts), validate=True)
              raw = lzma.decompress(compressed)
              source_sha = hashlib.sha256(raw).hexdigest()
              log += [f'chunks={len(parts)}', f'source_bytes={len(raw)}', f'source_sha256={source_sha}']

              expected_sha = 'bbc7c7405a0fa7fa07a60cae8494bb7a7aea0467d54da0f3e457e20f0fd0ce18'
              if source_sha != expected_sha:
                  raise ValueError(f'Unexpected source SHA-256: {source_sha}')

              shortcut = plistlib.loads(raw)
              actions = shortcut.get('WFWorkflowActions', [])
              questions = shortcut.get('WFWorkflowImportQuestions', [])
              log += [f'actions={len(actions)}', f'import_questions={len(questions)}']

              if len(actions) != 35:
                  raise ValueError(f'Expected 35 actions, got {len(actions)}')
              if len(questions) != 5:
                  raise ValueError(f'Expected 5 import questions, got {len(questions)}')

              ids = [a.get('WFWorkflowActionIdentifier') for a in actions]
              if ids.count('com.apple.mobiletimer-framework.MobileTimerIntents.MTCreateAlarmIntent') != 5:
                  raise ValueError('Expected exactly five Create Alarm actions')
              if ids.count('com.apple.mobiletimer-framework.MobileTimerIntents.MTGetAlarmsIntent') != 1:
                  raise ValueError('Expected exactly one filtered Get Alarms action')
              if 'is.workflow.actions.addnewreminder' in ids:
                  raise ValueError('Reminder actions must not exist in V4.3')
              if 'is.workflow.actions.vibrate' in ids:
                  raise ValueError('Vibrate actions must not exist in V4.3')

              for q in questions:
                  if q.get('ActionIndex') not in (1,2,3,4,5):
                      raise ValueError(f'Unexpected import question index: {q}')

              xml = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False).decode('utf-8')
              payload = json.dumps({
                  'shortcutName': 'منبّه الصلوات الذكي V4.3',
                  'shortcut': xml,
              }, ensure_ascii=False).encode('utf-8')
              log.append(f'payload_bytes={len(payload)}')

              req = urllib.request.Request(
                  'https://hubsign.routinehub.services/sign',
                  data=payload,
                  headers={
                      'Content-Type': 'application/json',
                      'User-Agent': 'cherri/2.3.0',
                      'Accept': '*/*',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=90) as res:
                  body = res.read()
                  log += [f'status={res.status}', f'response_bytes={len(body)}', f'prefix={body[:16]!r}']

              Path('hubsign-response.bin').write_bytes(body)
              if not body.startswith(b'AEA1'):
                  raise ValueError('HubSign did not return an AEA1 signed shortcut')

              Path('Prayer_Alarm_Smart_V4_3_Signed.shortcut').write_bytes(body)
              Path('Prayer_Alarm_Smart_V4_3_Source.shortcut').write_bytes(raw)
              log += ['signed=true', f'signed_sha256={hashlib.sha256(body).hexdigest()}']

          except urllib.error.HTTPError as e:
              body = e.read()
              Path('hubsign-response.bin').write_bytes(body)
              log += [f'http_error={e.code}', f'body_prefix={body[:1000]!r}']
              raise
          except Exception as e:
              log += [f'exception={type(e).__name__}: {e}', traceback.format_exc()]
              raise
          finally:
              Path('sign-diagnostics.txt').write_text('\n'.join(log), encoding='utf-8')
              print('\n'.join(log))
          PY

      - name: Upload signed V4.3 and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarm_Smart_V4_3_Alarm_Only
          path: |
            Prayer_Alarm_Smart_V4_3_Signed.shortcut
            Prayer_Alarm_Smart_V4_3_Source.shortcut
            sign-diagnostics.txt
            hubsign-response.bin
          if-no-files-found: warn
