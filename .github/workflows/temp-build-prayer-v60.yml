name: Temp Build Prayer V6

on:
  push:
    branches: [temp-build-prayer-v60-20260711]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test current AlAdhan responses
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          curl -fsSL 'https://api.aladhan.com/v1/timings/11-07-2026?latitude=24.7136&longitude=46.6753&method=4&iso8601=true' -o build/api-ddmmyyyy.json
          python3 - <<'PY' | tee build/api-analysis.txt
          import json
          d=json.load(open('build/api-ddmmyyyy.json'))
          assert d.get('code') == 200, d
          assert isinstance(d.get('data'), dict), type(d.get('data'))
          assert isinstance(d['data'].get('timings'), dict), type(d['data'].get('timings'))
          assert d['data']['timings'].get('Fajr')
          print('api_ok=true')
          print('fajr=', d['data']['timings']['Fajr'])
          PY
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Install Cherri
        run: go install github.com/electrikmilk/cherri@68f3f3feaf00768f7943f650b2230605355936ed
      - name: Preprocess V6 Cherri sources
        run: |
          python3 shortcut-v60/preprocess.py
          python3 shortcut-v60/postfix.py
      - name: Compile complete V6 shortcuts
        shell: bash
        run: |
          set -euo pipefail
          CHERRI="$(go env GOPATH)/bin/cherri"
          "$CHERRI" shortcut-v60/test.cherri --skip-sign 2>&1 | tee build/test-compile.log
          "$CHERRI" shortcut-v60/prayer-settings-v60.cherri --skip-sign 2>&1 | tee build/settings-compile.log
          "$CHERRI" shortcut-v60/prayer-main-v60.cherri --skip-sign 2>&1 | tee build/main-compile.log
          file shortcut-v60/*_unsigned.shortcut | tee build/file-types.txt
          ls -lah build shortcut-v60 | tee build/listing-before-sign.txt
      - name: Patch, validate and sign V6
        run: |
          set -euo pipefail
          python3 shortcut-v60/inspect_sign.py | tee build/sign.log
          python3 - <<'PY' | tee build/structural-validation.txt
          import plistlib
          p=plistlib.load(open('build/Prayer_Alarm_Smart_V6_0_Source.shortcut','rb'))
          actions=p['WFWorkflowActions']
          adjusts=[a for a in actions if a.get('WFWorkflowActionIdentifier')=='is.workflow.actions.adjustdate']
          assert len(adjusts) == 2, len(adjusts)
          for a in adjusts:
              d=a['WFWorkflowActionParameters']['WFDuration']
              assert d['WFSerializationType']=='WFQuantityFieldValue', d
              assert 'oneDay' not in repr(d) and 'offsetDuration' not in repr(d), d
          alarm_index=next(i for i,a in enumerate(actions) if a.get('WFWorkflowActionIdentifier')=='com.apple.mobiletimer-framework.MobileTimerIntents.MTGetAlarmsIntent')
          repeat_index=next(i for i,a in enumerate(actions) if a.get('WFWorkflowActionIdentifier')=='is.workflow.actions.repeat.each' and a.get('WFWorkflowActionParameters',{}).get('WFControlFlowMode')==0)
          assert alarm_index > repeat_index, (alarm_index, repeat_index)
          assert any(a.get('WFWorkflowActionIdentifier')=='is.workflow.actions.notification' for a in actions)
          print('duration_patch_ok=true')
          print('cleanup_inside_loop=true')
          PY
          file build/*.shortcut | tee build/signed-file-types.txt
          ls -lah build | tee build/listing-after-sign.txt
      - name: Upload signed V6 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarm_Smart_V6_0_Complete
          path: |
            build/
            shortcut-v60/*.cherri
            shortcut-v60/*.py
            shortcut-v60/*_unsigned.shortcut
          if-no-files-found: warn
