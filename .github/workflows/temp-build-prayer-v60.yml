name: Temp Build Prayer V6

on:
  push:
    branches: [temp-build-prayer-v60-20260711]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Install Cherri
        run: go install github.com/electrikmilk/cherri@68f3f3feaf00768f7943f650b2230605355936ed
      - name: Preprocess V6 Cherri sources
        run: |
          python3 shortcut-v60/preprocess.py
          python3 shortcut-v60/postfix.py
      - name: Compile complete V6 shortcuts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          CHERRI="$(go env GOPATH)/bin/cherri"
          "$CHERRI" shortcut-v60/test.cherri --skip-sign 2>&1 | tee build/test-compile.log
          "$CHERRI" shortcut-v60/prayer-settings-v60.cherri --skip-sign 2>&1 | tee build/settings-compile.log
          "$CHERRI" shortcut-v60/prayer-main-v60.cherri --skip-sign 2>&1 | tee build/main-compile.log
          file shortcut-v60/*_unsigned.shortcut | tee build/file-types.txt
          ls -lah build shortcut-v60 | tee build/listing-before-sign.txt
      - name: Patch, validate and sign V6
        run: |
          set -euo pipefail
          python3 shortcut-v60/inspect_sign.py | tee build/sign.log
          file build/*.shortcut | tee build/signed-file-types.txt
          ls -lah build | tee build/listing-after-sign.txt
      - name: Upload signed V6 package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarm_Smart_V6_0_Complete
          path: |
            build/
            shortcut-v60/*.cherri
            shortcut-v60/*.py
            shortcut-v60/*_unsigned.shortcut
          if-no-files-found: warn
