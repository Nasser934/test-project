name: Temp Sign Prayer V4.8

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout V4.7 payload only
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing-v47
          sparse-checkout-cone-mode: true

      - name: Rewire URL output and sign Prayer V4.8 with HubSign
        run: |
          python3 - <<'PY'
          import base64, hashlib, json, lzma, plistlib, urllib.request, urllib.error, traceback, uuid
          from pathlib import Path

          log = []
          try:
              compressed = base64.b64decode(Path('shortcut-signing-v47/Prayer_Alarm_V47.xz.b64').read_text().strip(), validate=True)
              raw = lzma.decompress(compressed)
              shortcut = plistlib.loads(raw)
              actions = shortcut.get('WFWorkflowActions', [])
              questions = shortcut.get('WFWorkflowImportQuestions', [])

              shortcut['WFWorkflowName'] = 'منبه الصلوات الذكي V4.8'

              url_idxs = [i for i,a in enumerate(actions) if a.get('WFWorkflowActionIdentifier') == 'is.workflow.actions.url']
              open_idxs = [i for i,a in enumerate(actions) if a.get('WFWorkflowActionIdentifier') in ('is.workflow.actions.openurl', 'is.workflow.actions.openurls')]
              if not url_idxs:
                  raise ValueError('No URL action found')
              if not open_idxs:
                  raise ValueError('No Open URL action found')

              ui = url_idxs[-1]
              ua = actions[ui]
              up = ua.setdefault('WFWorkflowActionParameters', {})
              up['WFURLActionURL'] = 'clock-alarm:default'
              url_uuid = up.get('UUID') or str(uuid.uuid4()).upper()
              up['UUID'] = url_uuid

              oi = next((i for i in open_idxs if i > ui), open_idxs[-1])
              oa = actions[oi]
              op = oa.setdefault('WFWorkflowActionParameters', {})
              op['WFInput'] = {
                  'Value': {
                      'OutputUUID': url_uuid,
                      'Type': 'ActionOutput',
                      'OutputName': 'URL',
                  },
                  'WFSerializationType': 'WFTextTokenAttachment',
              }
              for key in ('WFURLActionURL', 'URL', 'url', 'WFOpenURLActionURL'):
                  op.pop(key, None)

              # Update visible V4 label in comment if present.
              for a in actions:
                  p = a.get('WFWorkflowActionParameters', {})
                  if isinstance(p.get('WFCommentActionText'), str):
                      p['WFCommentActionText'] = p['WFCommentActionText'].replace('V4.7', 'V4.8')

              # Hard validation of the exact fix.
              wired = actions[oi]['WFWorkflowActionParameters']['WFInput']
              if wired.get('WFSerializationType') != 'WFTextTokenAttachment':
                  raise ValueError('Open URL input is not a token attachment')
              value = wired.get('Value', {})
              if value.get('Type') != 'ActionOutput':
                  raise ValueError(f'Open URL input Type is not ActionOutput: {value}')
              if value.get('OutputUUID') != url_uuid:
                  raise ValueError(f'Open URL is not wired to URL action UUID: {value}')
              if up.get('WFURLActionURL') != 'clock-alarm:default':
                  raise ValueError('Unexpected alarm URL')
              if any(a.get('WFWorkflowActionIdentifier') == 'com.apple.mobiletimer.UpdateAlarmIntent' for a in actions):
                  raise ValueError('Unsupported hidden UpdateAlarmIntent remains')

              serialized = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False)
              source_sha = hashlib.sha256(serialized).hexdigest()
              Path('Prayer_Alarm_Smart_V4_8_Source.shortcut').write_bytes(serialized)

              payload = json.dumps({
                  'shortcutName': 'منبه الصلوات الذكي V4.8',
                  'shortcut': serialized.decode('utf-8'),
              }, ensure_ascii=False).encode('utf-8')

              req = urllib.request.Request(
                  'https://hubsign.routinehub.services/sign',
                  data=payload,
                  headers={
                      'Content-Type': 'application/json',
                      'User-Agent': 'cherri/2.3.0',
                      'Accept': '*/*',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=90) as res:
                  body = res.read()
                  log += [
                      f'status={res.status}',
                      f'source_sha256={source_sha}',
                      f'actions={len(actions)}',
                      f'import_questions={len(questions)}',
                      f'url_action_index={ui}',
                      f'open_url_action_index={oi}',
                      f'url_action_uuid={url_uuid}',
                      f'wired_output_uuid={value.get("OutputUUID")}',
                      f'wired_type={value.get("Type")}',
                      f'url_value={up.get("WFURLActionURL")}',
                      f'response_bytes={len(body)}',
                      f'prefix={body[:4]!r}',
                  ]

              Path('hubsign-response.bin').write_bytes(body)
              if not body.startswith(b'AEA1'):
                  raise ValueError('HubSign did not return an AEA1 signed shortcut')

              Path('Prayer_Alarm_Smart_V4_8_Signed.shortcut').write_bytes(body)
              log += ['signed=true', f'signed_sha256={hashlib.sha256(body).hexdigest()}']

          except urllib.error.HTTPError as e:
              body = e.read()
              Path('hubsign-response.bin').write_bytes(body)
              log += [f'http_error={e.code}', f'body_prefix={body[:1000]!r}']
              raise
          except Exception as e:
              log += [f'exception={type(e).__name__}: {e}', traceback.format_exc()]
              raise
          finally:
              Path('sign-diagnostics.txt').write_text('\n'.join(log), encoding='utf-8')
              print('\n'.join(log))
          PY

      - name: Upload signed V4.8 and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarm_Smart_V4_8_Signed
          path: |
            Prayer_Alarm_Smart_V4_8_Signed.shortcut
            Prayer_Alarm_Smart_V4_8_Source.shortcut
            sign-diagnostics.txt
            hubsign-response.bin
          if-no-files-found: warn
