name: Sign Prayer Shortcut

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout only shortcut payload
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing
          sparse-checkout-cone-mode: true

      - name: Try HubSign JSON API and save diagnostics
        run: |
          python3 - <<'PY'
          import base64, json, plistlib, urllib.request, urllib.error, traceback
          from pathlib import Path

          log = []
          try:
              raw_b64 = Path('shortcut-signing/Prayer_Alarms_No_Duplicates.b64').read_text().strip()
              raw = base64.b64decode(raw_b64)
              shortcut = plistlib.loads(raw)
              xml = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False).decode('utf-8')
              payload = json.dumps({
                  'shortcutName': 'منبه الصلوات بدون تكرار',
                  'shortcut': xml,
              }, ensure_ascii=False).encode('utf-8')
              log.append(f'payload_bytes={len(payload)}')

              req = urllib.request.Request(
                  'https://hubsign.routinehub.services/sign',
                  data=payload,
                  headers={
                      'Content-Type': 'application/json',
                      'User-Agent': 'cherri/2.3.0',
                      'Accept': '*/*',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=60) as res:
                  body = res.read()
                  log += [
                      f'status={res.status}',
                      f'final_url={res.geturl()}',
                      f'content_type={res.headers.get("Content-Type")}',
                      f'bytes={len(body)}',
                      f'prefix_repr={body[:200]!r}',
                  ]
              Path('hubsign-response.bin').write_bytes(body)
              if body.startswith(b'AEA1'):
                  Path('Prayer_Alarms_No_Duplicates_Signed.shortcut').write_bytes(body)
                  log.append('signed=true')
              else:
                  log.append('signed=false')
          except urllib.error.HTTPError as e:
              body = e.read()
              Path('hubsign-response.bin').write_bytes(body)
              log += [f'http_error={e.code}', f'url={e.geturl()}', f'headers={dict(e.headers)}', f'body_prefix={body[:1000]!r}']
          except Exception as e:
              log += [f'exception={type(e).__name__}: {e}', traceback.format_exc()]

          Path('hubsign-diagnostics.txt').write_text('\n'.join(log), encoding='utf-8')
          print('\n'.join(log))
          PY

      - name: Upload result and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hubsign-results
          path: |
            Prayer_Alarms_No_Duplicates_Signed.shortcut
            hubsign-response.bin
            hubsign-diagnostics.txt
          if-no-files-found: error
