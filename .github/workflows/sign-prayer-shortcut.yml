name: Sign Prayer Shortcut

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: macos-14
    steps:
      - name: Checkout only shortcut payload
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing
          sparse-checkout-cone-mode: true

      - name: Decode unsigned shortcut
        run: |
          python3 - <<'PY'
          import base64
          from pathlib import Path
          src = Path('shortcut-signing/Prayer_Alarms_No_Duplicates.b64').read_text().strip()
          Path('Prayer_Alarms_No_Duplicates.shortcut').write_bytes(base64.b64decode(src))
          PY
          ls -lh Prayer_Alarms_No_Duplicates.shortcut
          file Prayer_Alarms_No_Duplicates.shortcut

      - name: Show Shortcuts CLI help
        run: |
          shortcuts help sign || shortcuts sign --help || true

      - name: Sign shortcut for anyone
        run: |
          set +e
          shortcuts sign --mode anyone --input Prayer_Alarms_No_Duplicates.shortcut --output Prayer_Alarms_No_Duplicates_Signed.shortcut > sign.log 2>&1
          status=$?
          cat sign.log
          echo "sign_exit_code=$status"
          if [ "$status" -ne 0 ]; then exit "$status"; fi
          ls -lh Prayer_Alarms_No_Duplicates_Signed.shortcut
          file Prayer_Alarms_No_Duplicates_Signed.shortcut

      - name: Upload signed shortcut
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarms_No_Duplicates_Signed
          path: Prayer_Alarms_No_Duplicates_Signed.shortcut
          if-no-files-found: error

      - name: Upload signing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shortcut-sign-log
          path: sign.log
          if-no-files-found: ignore
