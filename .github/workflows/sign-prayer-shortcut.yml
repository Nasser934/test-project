name: Sign Prayer Shortcut

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: macos-15
    steps:
      - name: Checkout only shortcut payloads
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing
          sparse-checkout-cone-mode: true

      - name: Decode and convert shortcut payloads to XML plist
        run: |
          python3 - <<'PY'
          import base64
          from pathlib import Path
          for src_name, dst_name in [
              ('Original_Prayer_Alarms.b64', 'Original_Prayer_Alarms.shortcut'),
              ('Prayer_Alarms_No_Duplicates.b64', 'Prayer_Alarms_No_Duplicates.shortcut'),
          ]:
              src = Path('shortcut-signing', src_name).read_text().strip()
              Path(dst_name).write_bytes(base64.b64decode(src))
          PY
          cp Original_Prayer_Alarms.shortcut Original_Prayer_Alarms_XML.shortcut
          cp Prayer_Alarms_No_Duplicates.shortcut Prayer_Alarms_No_Duplicates_XML.shortcut
          plutil -convert xml1 Original_Prayer_Alarms_XML.shortcut
          plutil -convert xml1 Prayer_Alarms_No_Duplicates_XML.shortcut
          file *_XML.shortcut

      - name: Sign XML extracted original
        run: |
          set +e
          shortcuts sign --mode anyone --input Original_Prayer_Alarms_XML.shortcut --output Original_Prayer_Alarms_XML_Signed.shortcut > sign-original.log 2>&1
          status=$?
          cat sign-original.log
          echo "$status" > original-exit-code.txt
          exit 0

      - name: Sign XML no-duplicates version
        run: |
          set +e
          shortcuts sign --mode anyone --input Prayer_Alarms_No_Duplicates_XML.shortcut --output Prayer_Alarms_No_Duplicates_Signed.shortcut > sign-modified.log 2>&1
          status=$?
          cat sign-modified.log
          echo "$status" > modified-exit-code.txt
          exit 0

      - name: Upload signed files and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shortcut-sign-results-xml
          path: |
            *_Signed.shortcut
            sign-*.log
            *-exit-code.txt
          if-no-files-found: error
