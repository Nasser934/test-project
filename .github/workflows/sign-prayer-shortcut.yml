name: Sign Prayer Shortcut

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout only shortcut payload
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing
          sparse-checkout-cone-mode: true

      - name: Decode and sign with HubSign API
        run: |
          python3 - <<'PY'
          import base64, json, plistlib, urllib.request, urllib.error
          from pathlib import Path

          raw_b64 = Path('shortcut-signing/Prayer_Alarms_No_Duplicates.b64').read_text().strip()
          raw = base64.b64decode(raw_b64)
          shortcut = plistlib.loads(raw)
          xml = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False).decode('utf-8')

          payload = json.dumps({
              'shortcutName': 'منبه الصلوات بدون تكرار',
              'shortcut': xml,
          }, ensure_ascii=False).encode('utf-8')

          req = urllib.request.Request(
              'https://hubsign.routinehub.services/sign',
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'User-Agent': 'cherri/2.3.0',
                  'Accept': 'application/octet-stream, application/x-plist, application/x-apple-shortcut',
              },
              method='POST',
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as res:
                  body = res.read()
                  print('status=', res.status)
                  print('content-type=', res.headers.get('Content-Type'))
                  print('bytes=', len(body))
          except urllib.error.HTTPError as e:
              body = e.read()
              print('HTTP error=', e.code)
              print(body[:1000].decode('utf-8', errors='replace'))
              raise

          if not body.startswith(b'AEA1'):
              print('response prefix=', body[:200])
              raise SystemExit('HubSign response is not an AEA1 signed shortcut')

          Path('Prayer_Alarms_No_Duplicates_Signed.shortcut').write_bytes(body)
          print('Signed shortcut created successfully')
          PY

      - name: Upload signed shortcut
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarms_No_Duplicates_Signed
          path: Prayer_Alarms_No_Duplicates_Signed.shortcut
          if-no-files-found: error
