name: Temp Sign Prayer V4.7

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout V4.7 payload only
        uses: actions/checkout@v4
        with:
          show-progress: false
          sparse-checkout: |
            shortcut-signing-v47
          sparse-checkout-cone-mode: true

      - name: Validate and sign Prayer V4.7 with HubSign
        run: |
          python3 - <<'PY'
          import base64, hashlib, json, lzma, plistlib, urllib.request, urllib.error, traceback
          from pathlib import Path

          log = []
          try:
              compressed = base64.b64decode(Path('shortcut-signing-v47/Prayer_Alarm_V47.xz.b64').read_text().strip(), validate=True)
              raw = lzma.decompress(compressed)
              source_sha = hashlib.sha256(raw).hexdigest()
              expected_sha = '2b953986443fa07fa528b7beca318d139a6d7e1eb3335bb4bb34e7b5d9de7be0'
              if source_sha != expected_sha:
                  raise ValueError(f'Unexpected source SHA-256: {source_sha}')

              shortcut = plistlib.loads(raw)
              actions = shortcut.get('WFWorkflowActions', [])
              if len(actions) != 68:
                  raise ValueError(f'Expected 68 actions, got {len(actions)}')
              if shortcut.get('WFWorkflowName') != 'منبه الصلوات الذكي V4.7':
                  raise ValueError('Unexpected workflow name')

              identifiers = [a.get('WFWorkflowActionIdentifier', '') for a in actions]
              if sum('UpdateAlarmIntent' in x for x in identifiers) != 0:
                  raise ValueError('Unsupported update alarm action remains')
              if identifiers.count('com.apple.mobiletimer.DeleteAlarmIntent') != 5:
                  raise ValueError('Expected 5 delete-alarm actions')
              if identifiers.count('is.workflow.actions.waittoreturn') != 0:
                  raise ValueError('Old wait-to-return flow remains')
              if identifiers.count('is.workflow.actions.url') != 1:
                  raise ValueError('Expected exactly one URL action')
              if identifiers.count('is.workflow.actions.openurl') != 1:
                  raise ValueError('Expected exactly one Open URL action')

              url_values = [a.get('WFWorkflowActionParameters', {}).get('WFURLActionURL') for a in actions if a.get('WFWorkflowActionIdentifier') == 'is.workflow.actions.url']
              if url_values != ['clock-alarm:default']:
                  raise ValueError(f'Unexpected Clock URL: {url_values}')

              serialized = plistlib.dumps(shortcut, fmt=plistlib.FMT_XML, sort_keys=False)
              payload = json.dumps({
                  'shortcutName': 'منبه الصلوات الذكي V4.7',
                  'shortcut': serialized.decode('utf-8'),
              }, ensure_ascii=False).encode('utf-8')

              req = urllib.request.Request(
                  'https://hubsign.routinehub.services/sign',
                  data=payload,
                  headers={
                      'Content-Type': 'application/json',
                      'User-Agent': 'cherri/2.3.0',
                      'Accept': '*/*',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(req, timeout=90) as res:
                  body = res.read()
                  log += [
                      f'status={res.status}',
                      f'source_sha256={source_sha}',
                      f'actions={len(actions)}',
                      f'delete_alarm_actions={identifiers.count("com.apple.mobiletimer.DeleteAlarmIntent")}',
                      f'url_actions={identifiers.count("is.workflow.actions.url")}',
                      f'open_url_actions={identifiers.count("is.workflow.actions.openurl")}',
                      f'clock_url={url_values[0]}',
                      f'response_bytes={len(body)}',
                      f'prefix={body[:4]!r}',
                  ]

              Path('hubsign-response.bin').write_bytes(body)
              if not body.startswith(b'AEA1'):
                  raise ValueError('HubSign did not return an AEA1 signed shortcut')

              Path('Prayer_Alarm_Smart_V4_7_Signed.shortcut').write_bytes(body)
              Path('Prayer_Alarm_Smart_V4_7_Source.shortcut').write_bytes(raw)
              log += ['signed=true', f'signed_sha256={hashlib.sha256(body).hexdigest()}']

          except urllib.error.HTTPError as e:
              body = e.read()
              Path('hubsign-response.bin').write_bytes(body)
              log += [f'http_error={e.code}', f'body_prefix={body[:1000]!r}']
              raise
          except Exception as e:
              log += [f'exception={type(e).__name__}: {e}', traceback.format_exc()]
              raise
          finally:
              Path('sign-diagnostics.txt').write_text('\n'.join(log), encoding='utf-8')
              print('\n'.join(log))
          PY

      - name: Upload signed V4.7 and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Prayer_Alarm_Smart_V4_7_Signed
          path: |
            Prayer_Alarm_Smart_V4_7_Signed.shortcut
            Prayer_Alarm_Smart_V4_7_Source.shortcut
            sign-diagnostics.txt
            hubsign-response.bin
          if-no-files-found: warn
