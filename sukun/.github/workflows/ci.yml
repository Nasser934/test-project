name: iOS CI

on:
  push:
    branches: [main, project-sukun-ios]
  pull_request:

jobs:
  verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Core tests
        run: swift test --package-path Packages/SukunCore
      - name: Generate project
        run: xcodegen generate
      - name: Build simulator
        run: xcodebuild -project Sukun.xcodeproj -scheme Sukun -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
