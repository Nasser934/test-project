name: Sukun
options:
  bundleIdPrefix: com.sukun
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
packages:
  SukunCore:
    path: Packages/SukunCore
targets:
  Sukun:
    type: application
    platform: iOS
    sources:
      - SukunApp
      - Shared
    resources:
      - Resources/Assets.xcassets
      - Configuration/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sukun.app
        PRODUCT_NAME: Sukun
        INFOPLIST_KEY_CFBundleDisplayName: سُكون
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Configuration/Sukun.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SukunCore
      - target: SukunActivityMonitor
        embed: true
      - target: SukunShieldConfiguration
        embed: true
      - target: SukunShieldAction
        embed: true
  SukunActivityMonitor:
    type: app-extension
    platform: iOS
    sources:
      - Extensions/DeviceActivityMonitor
      - Shared
    info:
      path: Configuration/DeviceActivityMonitor-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sukun.app.activity-monitor
        CODE_SIGN_ENTITLEMENTS: Configuration/Extension.entitlements
        SKIP_INSTALL: YES
    dependencies:
      - package: SukunCore
  SukunShieldConfiguration:
    type: app-extension
    platform: iOS
    sources:
      - Extensions/ShieldConfiguration
    resources:
      - Resources/Assets.xcassets
    info:
      path: Configuration/ShieldConfiguration-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sukun.app.shield-configuration
        CODE_SIGN_ENTITLEMENTS: Configuration/Extension.entitlements
        SKIP_INSTALL: YES
  SukunShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - Extensions/ShieldAction
    info:
      path: Configuration/ShieldAction-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sukun.app.shield-action
        CODE_SIGN_ENTITLEMENTS: Configuration/Extension.entitlements
        SKIP_INSTALL: YES
schemes:
  Sukun:
    build:
      targets:
        Sukun: all
    run:
      config: Debug
    archive:
      config: Release
